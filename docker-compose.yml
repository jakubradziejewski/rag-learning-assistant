services:
  backend:
    build:
      context: .
      network: host
    network_mode: host
    container_name: rag_backend
    volumes:
      - .:/app
    environment:
      - UV_LINK_MODE=copy
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      - chromadb

  streamlit:
    build: .
    container_name: rag_streamlit
    command: [
      "streamlit",
      "run",
      "streamlit_app.py",
      "--server.address=0.0.0.0",
      "--server.port=8501",
    ]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - UV_LINK_MODE=copy
      - DMR_BASE_URL=http://model-runner.docker.internal:12434/engines/llama.cpp/v1
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  chroma_data: