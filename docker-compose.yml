services:
  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - UV_LINK_MODE=copy
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      - chromadb
    models:
      - embedding-model

  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=FALSE

models:
  embedding-model:
    model: ai/mxbai-embed-large
    runtime_flags:
      - "--embeddings"

volumes:
  chroma_data: